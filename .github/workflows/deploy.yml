name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: sudo apt-get install -y qpdf

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          PII_EMAIL: ${{ vars.PII_EMAIL }}
          PII_PHONE: ${{ vars.PII_PHONE }}
        run: npm run site:build

      - name: Clean up and prepare
        run: |
          rm --force docs/resume-pdf-debug.html
          cp CNAME docs/

      - name: Cache busting
        run: ./assetchecksum.sh

      - name: Deploy to gh-pages
        run: |
          cd docs
          git init
          git checkout --orphan gh-pages
          git add --all
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --message "Deploy $(date --utc '+%Y-%m-%d %H:%M:%S UTC')"
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages
